<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Spine</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="card">
      <p class="eyebrow">SPINE</p>
      <h1>Memory, ongoing.</h1>
      <p class="status" id="status">Loading…</p>

      <div class="hygiene">
        <p class="hygiene-label">Archive</p>
        <p class="hygiene-msg" id="hygieneMsg">No data yet.</p>
        <div class="hygiene-stats" id="hygieneStats" hidden>
          <div class="stat-row">
            <span class="stat"><strong id="statDups">0</strong> duplicates</span>
            <span class="stat-sep">·</span>
            <span class="stat"><strong id="statStale">0</strong> stale</span>
          </div>
          <a id="archiveLink" class="archive-link" href="#">Tend your archive →</a>
        </div>
      </div>

      <div class="actions">
        <button id="flush" class="primary">Flush queue</button>
        <button id="open" class="ghost">Open settings</button>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
